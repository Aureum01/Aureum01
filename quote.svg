<svg fill="none" viewBox="0 0 820 80" width="820" height="80" xmlns="http://www.w3.org/2000/svg">
<foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .wrap {
    width: 820px; height: 80px;
    background: #0c0a08;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
    gap: 6px;
  }
  .corner-l, .corner-r {
    position: absolute;
    bottom: 10px;
    font-family: Georgia, serif;
    font-size: 28px;
    color: rgba(45,26,0,0.22);
    line-height: 1;
  }
  .corner-l { left: 24px; }
  .corner-r { right: 24px; transform: scaleX(-1); }
  .qt {
    font-family: Georgia, serif;
    font-size: 12.5px;
    font-style: italic;
    color: #7a5c30;
    text-align: center;
    line-height: 1.55;
    animation: breathe 8s ease-in-out infinite;
  }
  .attr {
    font-family: Georgia, serif;
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(61,34,0,0.55);
    text-transform: uppercase;
    animation: breathe 8s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { opacity: 0.28; }
    50%      { opacity: 0.85; }
  }
</style>
<div class="wrap">
  <div class="corner-l">❧</div>
  <div class="corner-r">❧</div>
  <div class="qt">
    "The boundaries which divide Life from Death are at best shadowy and vague.<br/>
    Who shall say where the one ends, and where the other begins?"
  </div>
  <div class="attr">— Edgar Allan Poe</div>
</div>
</div>
</foreignObject>
</svg>
