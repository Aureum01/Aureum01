<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 36" width="820" height="36">
  <rect width="820" height="36" fill="#0b0907"/>
  <!-- horizontal rule -->
  <line x1="30" y1="18" x2="790" y2="18" stroke="#2d1500" stroke-width="0.8" opacity="0.45"/>
  <!-- ornament -->
  <text x="410" y="23" font-family="Georgia,serif" font-size="11" fill="#4a2200"
        text-anchor="middle" opacity="0.55">✦  ☽  ✦</text>
  <!-- drip 1 -->
  <ellipse cx="145" cy="20" rx="3.5" ry="6" fill="#6B0000" opacity="0.5">
    <animateTransform attributeName="transform" type="translate"
      values="0,0;0,7;0,0" dur="3.2s" repeatCount="indefinite"/>
  </ellipse>
  <!-- drip 2 -->
  <ellipse cx="295" cy="20" rx="2.5" ry="5" fill="#8B0000" opacity="0.4">
    <animateTransform attributeName="transform" type="translate"
      values="0,0;0,10;0,0" dur="4.1s" begin="-1s" repeatCount="indefinite"/>
  </ellipse>
  <!-- drip 3 -->
  <ellipse cx="545" cy="20" rx="2.5" ry="5" fill="#8B0000" opacity="0.4">
    <animateTransform attributeName="transform" type="translate"
      values="0,0;0,9;0,0" dur="2.9s" begin="-0.5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- drip 4 -->
  <ellipse cx="672" cy="20" rx="3" ry="6" fill="#6B0000" opacity="0.5">
    <animateTransform attributeName="transform" type="translate"
      values="0,0;0,8;0,0" dur="4.4s" begin="-1.8s" repeatCount="indefinite"/>
  </ellipse>
</svg>
