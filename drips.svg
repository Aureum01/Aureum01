<svg fill="none" viewBox="0 0 820 44" width="820" height="44" xmlns="http://www.w3.org/2000/svg">
<foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .wrap {
    width: 820px; height: 44px;
    background: #0c0a08;
    position: relative;
    overflow: hidden;
  }
  .rule {
    position: absolute;
    top: 16px; left: 30px; right: 30px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(61,26,0,0.4) 10%, rgba(61,26,0,0.4) 90%, transparent);
  }
  .orn {
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    font-family: Georgia, serif;
    font-size: 9px;
    letter-spacing: 8px;
    color: rgba(92,34,0,0.45);
    white-space: nowrap;
    margin-left: -24px;
  }
  .drop {
    position: absolute;
    top: 17px;
    border-radius: 50% 50% 60% 60%;
    background: #6B0000;
  }
  .d1 { left: 155px; width: 7px;  height: 12px; opacity: 0.5;  animation: dp1 3.2s ease-in-out infinite; }
  .d2 { left: 296px; width: 5px;  height: 10px; opacity: 0.4;  animation: dp2 4.1s ease-in-out infinite 1s; }
  .d3 { left: 407px; width: 8px;  height: 14px; opacity: 0.55; animation: dp1 3.6s ease-in-out infinite 2s; background: #8B0000; }
  .d4 { left: 536px; width: 5px;  height: 10px; opacity: 0.4;  animation: dp2 2.9s ease-in-out infinite 0.5s; }
  .d5 { left: 677px; width: 6px;  height: 12px; opacity: 0.5;  animation: dp1 4.4s ease-in-out infinite 1.8s; }
  @keyframes dp1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(8px)} }
  @keyframes dp2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(11px)} }
</style>
<div class="wrap">
  <div class="rule"></div>
  <div class="orn">✦  ☽  ✦</div>
  <div class="drop d1"></div>
  <div class="drop d2"></div>
  <div class="drop d3"></div>
  <div class="drop d4"></div>
  <div class="drop d5"></div>
</div>
</div>
</foreignObject>
</svg>
