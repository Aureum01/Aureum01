<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 820 390" width="820" height="390">
<foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .scene {
    width:820px; height:390px;
    background:#09080600;
    background: linear-gradient(160deg,#0b0907 0%,#100c07 100%);
    display:flex; overflow:hidden; border-radius:4px;
    position:relative;
  }
  /* moon */
  .moon {
    position:absolute; top:12px; left:264px;
    width:48px; height:48px; border-radius:50%;
    background:radial-gradient(circle at 38% 38%,rgba(255,248,220,0.18),transparent 68%);
    animation:mpulse 7s ease-in-out infinite;
    pointer-events:none; z-index:1;
  }
  @keyframes mpulse{ 0%,100%{opacity:.7} 50%{opacity:1} }
  /* fireflies */
  .ff {
    position:absolute; width:2px; height:2px; border-radius:50%;
    background:#b89040; opacity:0; z-index:1;
    animation:ffly var(--d,7s) ease-in-out infinite var(--delay,0s);
  }
  @keyframes ffly{
    0%{opacity:0;transform:translate(0,0)}
    25%{opacity:.8}
    50%{opacity:.4;transform:translate(var(--tx,12px),var(--ty,-16px))}
    75%{opacity:.75}
    100%{opacity:0;transform:translate(calc(var(--tx,12px)*1.3),calc(var(--ty,-16px)*.5))}
  }
  /* tree sway anchored at base */
  .tree-wrap {
    transform-origin:50% 98%;
    animation:sway 9s ease-in-out infinite;
    position:relative; z-index:2;
  }
  @keyframes sway{
    0%,100%{transform:rotate(-1.2deg)}
    50%    {transform:rotate(0.9deg)}
  }
  /* ASCII pre */
  pre.t {
    font-family:'Courier New',Courier,monospace;
    font-size:9px; line-height:1.20;
    white-space:pre; user-select:none;
    letter-spacing:0;
  }
  /* colour palette */
  .tk { color:#5c3318; } /* trunk core */
  .to { color:#3d2206; } /* trunk outer */
  .b1 { color:#2e1a06; } /* branch 1 */
  .b2 { color:#261508; } /* branch 2 */
  .tw { color:#1e1005; } /* twig */
  .dl { color:#4a2c10; } /* dead leaf/diamond */
  .gr { color:#150e04; } /* ground */
  .ms { color:#221400; } /* mist */
  .rv { color:#0d0a06; animation:rblink 5s ease-in-out infinite; } /* raven */
  @keyframes rblink{ 0%,80%,100%{color:#0d0a06} 85%{color:#251508} 90%{color:#0d0a06} }
  .ey { color:#8B0000; animation:eglow 3.2s ease-in-out infinite; }
  .e2 { color:#C8A060; animation:eglow 3.2s ease-in-out infinite 1.6s; }
  @keyframes eglow{ 0%,100%{opacity:.12} 50%{opacity:.95} }
  /* mist */
  .mist {
    position:absolute; bottom:0; left:-30px; right:-30px; height:40px;
    background:linear-gradient(to top,rgba(45,20,0,.20) 0%,transparent 100%);
    animation:mdrift 13s ease-in-out infinite; pointer-events:none;
  }
  .mist2 {
    position:absolute; bottom:0; left:-60px; right:-60px; height:26px;
    background:linear-gradient(to top,rgba(35,15,0,.14) 0%,transparent 100%);
    animation:mdrift 18s ease-in-out infinite 6s; pointer-events:none;
  }
  @keyframes mdrift{ 0%,100%{transform:translateX(0)} 50%{transform:translateX(20px)} }
  /* left panel */
  .left {
    width:345px; flex-shrink:0;
    position:relative; overflow:hidden;
    padding:6px 0 0 2px;
  }
  /* divider */
  .div {
    width:1px; align-self:stretch;
    background:linear-gradient(to bottom,transparent,rgba(48,26,0,.5) 12%,rgba(48,26,0,.5) 88%,transparent);
    flex-shrink:0; margin:12px 0;
  }
  /* right panel */
  .right {
    flex:1; padding:18px 18px 14px 16px;
    display:flex; flex-direction:column; gap:8px; overflow:hidden;
  }
  .sl {
    font-family:Georgia,serif; font-size:7.5px; letter-spacing:4px;
    color:rgba(92,42,0,.75); text-transform:uppercase;
    border-bottom:1px solid rgba(45,26,0,.38); padding-bottom:5px;
  }
  .intro {
    font-family:Georgia,serif; font-size:11px; line-height:1.62; color:#8B7040;
  }
  .intro em{ color:#6B5030; font-style:italic; }
  .dl2 {
    font-family:Georgia,serif; font-size:7.5px; letter-spacing:3px;
    color:rgba(92,42,0,.65); text-transform:uppercase;
    border-top:1px dashed rgba(45,26,0,.28); padding-top:6px; margin-top:1px;
  }
  .domains{ display:flex; flex-direction:column; gap:3px; }
  .dr{ display:flex; gap:3px; }
  .dk2{
    background:rgba(24,14,6,.55); border-radius:2px; padding:2px 6px;
    font-family:Georgia,serif; font-size:9.5px; color:#C8A060;
    font-weight:bold; min-width:122px;
  }
  .dv2{
    background:rgba(14,9,3,.55); border-radius:2px; padding:2px 6px;
    font-family:Georgia,serif; font-size:9.5px; color:#7a6030; flex:1;
  }
  .sig{
    font-family:Georgia,serif; font-size:8px;
    color:rgba(61,34,0,.3); font-style:italic; text-align:right; margin-top:auto;
  }
</style>

<div class="scene">

  <div class="moon"></div>

  <!-- fireflies -->
  <div class="ff" style="--d:6.2s;--delay:-1.1s;--tx:16px;--ty:-20px;top:55px;left:72px;"></div>
  <div class="ff" style="--d:8.4s;--delay:-3.3s;--tx:-13px;--ty:-17px;top:108px;left:192px;"></div>
  <div class="ff" style="--d:7.1s;--delay:-5.5s;--tx:20px;--ty:-11px;top:175px;left:55px;"></div>
  <div class="ff" style="--d:9.3s;--delay:-2.2s;--tx:-18px;--ty:-26px;top:88px;left:252px;"></div>
  <div class="ff" style="--d:6.8s;--delay:-4.6s;--tx:14px;--ty:-19px;top:230px;left:128px;"></div>
  <div class="ff" style="--d:8.0s;--delay:-7.0s;--tx:-11px;--ty:-14px;top:148px;left:308px;"></div>
  <div class="ff" style="--d:7.5s;--delay:-0.8s;--tx:19px;--ty:-22px;top:42px;left:180px;"></div>

  <!-- ══ LEFT: ASCII TREE ══ -->
  <div class="left">
    <div class="mist"></div>
    <div class="mist2"></div>
    <div class="tree-wrap">
<pre class="t">
<span class="tw">       ,'</span><span class="dl">*</span><span class="tw">.</span>
<span class="tw">      /   '</span><span class="b1">.</span>
<span class="tw">     '</span><span class="b1">     \</span><span class="tw">  ,'</span><span class="dl">*</span><span class="tw">.</span>
<span class="b1">      \     '</span><span class="tw">\/   '</span><span class="b1">.</span>
<span class="tw">  ,'</span><span class="dl">*</span><span class="tw">. \      '  ,'</span><span class="dl">*</span><span class="tw">.</span>
<span class="tw"> /   '\</span><span class="b1">'</span><span class="tw">·,</span><span class="b1">    </span><span class="rv">▄▀▀▄</span>
<span class="b1">'     \  '</span><span class="tw">·,</span><span class="rv"> ▄▀▄</span><span class="rv">▀▄</span>
