</pre>
    </div>
  </div>

  <!-- divider -->
  <div class="div"></div>

  <!-- ══ RIGHT: Content ══ -->
  <div class="right">
    <div class="sl">Intelligence Systems Lab</div>

    <div class="intro">
      I design automation systems, intelligence workflows, and analytical tools
      that help analysts work more effectively in complex global environments.<br/><br/>
      <em>Previously: Corporate Protective Intelligence Analyst — monitoring
      geopolitical risk across global regions as a security contractor.</em>
    </div>

    <div class="dl2">Core Domains</div>

    <div class="domains">
      <div class="dr"><div class="dk2">Geopolitical Intel</div><div class="dv2">Global political risk monitoring</div></div>
      <div class="dr"><div class="dk2">OSINT Engineering</div><div class="dv2">Data pipelines + ingestion systems</div></div>
      <div class="dr"><div class="dk2">Automation</div><div class="dv2">Reduce analyst workload</div></div>
      <div class="dr"><div class="dk2">AI Systems</div><div class="dv2">Local AI for research workflows</div></div>
      <div class="dr"><div class="dk2">Behavioral Analysis</div><div class="dv2">Psychological pattern analysis</div></div>
    </div>

    <div class="sig">— Aureum01</div>
  </div>

</div>
</div>
</foreignObject>
</svg>
