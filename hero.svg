<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 860 420" width="860" height="420">
<foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#181510;--deep:#0f0e0a;--footer:#221E10;
  --border:#3D3519;--gold:#ECB913;--gold-dim:rgba(236,185,19,.5);
  --gold-faint:rgba(236,185,19,.025);
  --text:#E8E0CC;--text2:#A89D72;--text3:#6B5F3A;
  --eco:#ECB913;--bcast:#60A5FA;--gov:#A78BFA;--reg:#34D399;
  --live:#EF4444;--live-bg:rgba(239,68,68,.12);--live-border:rgba(239,68,68,.3);
  --ok:#4ADE80;--ok-bg:rgba(74,222,128,.1);
  --r:.75rem;--r2:1rem;
}
.shell{
  width:860px;height:420px;
  background:var(--deep);
  font-family:'Manrope',sans-serif;
  color:var(--text);
  position:relative;overflow:hidden;
  border-radius:6px;
  border:1px solid var(--border);
}
/* grid overlay */
.shell::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(var(--gold-faint) 1px,transparent 1px),
    linear-gradient(90deg,var(--gold-faint) 1px,transparent 1px);
  background-size:44px 44px;
  pointer-events:none;z-index:0;
}
/* scan line */
.shell::after{
  content:'';position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(236,185,19,.08),transparent);
  animation:scan 8s linear infinite;z-index:1;pointer-events:none;
}
@keyframes scan{0%{top:-2px}100%{top:100%}}

/* header bar */
.hdr{
  position:relative;z-index:2;
  height:44px;background:var(--bg);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;
}
.hdr-logo{
  font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:700;
  letter-spacing:.2em;color:var(--gold);text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.hdr-logo::before{
  content:'';display:block;width:6px;height:6px;border-radius:50%;
  background:var(--gold);
  animation:blink 2.4s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 0 0 var(--gold)}50%{opacity:.4;box-shadow:0 0 8px 2px var(--gold)}}
.hdr-sep{width:1px;height:18px;background:var(--border);}
.hdr-tag{
  font-size:.55rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;
  color:var(--text3);padding:2px 6px;border:1px solid var(--border);
  border-radius:3px;font-family:'JetBrains Mono',monospace;
}
.hdr-live{
  margin-left:auto;
  font-size:.55rem;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;
  background:var(--live-bg);border:1px solid var(--live-border);
  color:var(--live);border-radius:3px;padding:2px 7px;
  font-family:'JetBrains Mono',monospace;
  display:flex;align-items:center;gap:5px;
}
.hdr-live::before{
  content:'';width:5px;height:5px;border-radius:50%;background:var(--live);
  animation:livepulse 1.2s ease-in-out infinite;
}
@keyframes livepulse{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-ts{
  font-family:'JetBrains Mono',monospace;font-size:.58rem;
  color:rgba(236,185,19,.4);letter-spacing:.04em;
}

/* main layout */
.main{
  position:relative;z-index:2;
  display:flex;height:calc(420px - 44px - 38px);
}

/* left col: signal cards */
.left{
  width:200px;flex-shrink:0;
  border-right:1px solid var(--border);
  padding:10px 0;display:flex;flex-direction:column;gap:2px;
  background:rgba(24,21,16,.6);backdrop-filter:blur(8px);
}
.col-lbl{
  font-size:.55rem;font-weight:800;letter-spacing:.18em;
  text-transform:uppercase;color:var(--gold-dim);
  padding:0 12px 6px;border-bottom:1px solid var(--border);
  margin-bottom:4px;font-family:'JetBrains Mono',monospace;
}
.sig-card{
  padding:6px 12px;cursor:default;
  display:flex;flex-direction:column;gap:2px;
  border-left:2px solid transparent;
  transition:background .2s;
}
.sig-card.active{
  background:rgba(236,185,19,.06);
  border-left-color:var(--gold);
}
.sig-card.eco .dot{background:var(--eco);}
.sig-card.bcast .dot{background:var(--bcast);}
.sig-card.gov .dot{background:var(--gov);}
.sig-card.reg .dot{background:var(--reg);}
.sig-row{display:flex;align-items:center;gap:6px;}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sig-name{font-size:.7rem;font-weight:700;color:var(--text);}
.sig-sub{font-size:.6rem;color:var(--text3);font-family:'JetBrains Mono',monospace;padding-left:11px;}
.sig-stat{
  margin-left:auto;font-size:.55rem;font-weight:700;
  font-family:'JetBrains Mono',monospace;
}
.sig-card.eco .sig-stat{color:var(--eco);}
.sig-card.bcast .sig-stat{color:var(--bcast);}
.sig-card.gov .sig-stat{color:var(--gov);}
.sig-card.reg .sig-stat{color:var(--reg);}

/* center: main stage */
.center{
  flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:10px;
}
.stage-well{
  background:var(--deep);border:1px solid var(--border);
  border-radius:var(--r2);padding:16px;
  box-shadow:inset 0 1px 0 rgba(236,185,19,.04);
  flex:1;display:flex;flex-direction:column;gap:10px;
  position:relative;overflow:hidden;
}
/* subtle inner glow on stage */
.stage-well::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(236,185,19,.15),transparent);
}
.stage-title{
  font-size:1.15rem;font-weight:800;color:var(--text);
  letter-spacing:-.01em;line-height:1.2;
}
.stage-title span{color:var(--gold);}
.stage-sub{
  font-size:.72rem;color:var(--text2);line-height:1.6;font-weight:400;
}
.stage-sub em{color:var(--text);font-style:normal;font-weight:600;}
.stage-quote{
  margin-top:auto;
  padding:10px 12px;
  background:rgba(42,36,18,.4);border:1px solid var(--border);
  border-radius:.75rem;
  font-size:.7rem;color:var(--text3);
  font-style:italic;line-height:1.6;
  position:relative;
  animation:quotefade 12s ease-in-out infinite;
}
@keyframes quotefade{0%,100%{opacity:.6}50%{opacity:1}}
.stage-quote::before{
  content:'"';position:absolute;top:-4px;left:10px;
  font-size:1.4rem;color:var(--gold-dim);font-style:normal;line-height:1;
}
.stage-quote .attr{
  margin-top:4px;font-style:normal;font-size:.58rem;
  font-family:'JetBrains Mono',monospace;
  color:var(--text3);letter-spacing:.08em;text-transform:uppercase;
}

/* metrics row */
.metrics{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
}
.metric{
  background:rgba(24,21,16,.7);border:1px solid var(--border);
  border-radius:.625rem;padding:8px 10px;
  display:flex;flex-direction:column;gap:2px;
}
.metric-lbl{
  font-size:.52rem;font-weight:800;letter-spacing:.18em;
  text-transform:uppercase;color:var(--text3);
  font-family:'JetBrains Mono',monospace;
}
.metric-val{
  font-size:.85rem;font-weight:700;color:var(--gold);
  font-family:'JetBrains Mono',monospace;
}
.metric-bar{
  height:2px;background:var(--border);border-radius:1px;margin-top:4px;overflow:hidden;
}
.metric-bar-fill{
  height:100%;border-radius:1px;background:var(--gold);
  animation:barfill 4s ease-in-out infinite;
}
.metric:nth-child(2) .metric-bar-fill{animation-delay:1s;background:var(--bcast);}
.metric:nth-child(3) .metric-bar-fill{animation-delay:2s;background:var(--reg);}
@keyframes barfill{
  0%{width:20%}40%{width:78%}60%{width:78%}100%{width:20%}
}

/* right col: domain panel */
.right{
  width:220px;flex-shrink:0;
  border-left:1px solid var(--border);
  padding:10px 0;display:flex;flex-direction:column;gap:0;
  background:rgba(24,21,16,.6);backdrop-filter:blur(8px);
}
.domain-lbl{
  font-size:.55rem;font-weight:800;letter-spacing:.18em;
  text-transform:uppercase;color:var(--gold-dim);
  padding:0 12px 6px;border-bottom:1px solid var(--border);
  margin-bottom:4px;font-family:'JetBrains Mono',monospace;
}
.domain-row{
  padding:7px 12px;display:flex;flex-direction:column;gap:2px;
  border-bottom:1px solid rgba(61,53,25,.5);
  animation:rowin 1s ease both;
}
.domain-row:nth-child(2){animation-delay:.1s}
.domain-row:nth-child(3){animation-delay:.2s}
.domain-row:nth-child(4){animation-delay:.3s}
.domain-row:nth-child(5){animation-delay:.4s}
.domain-row:nth-child(6){animation-delay:.5s}
@keyframes rowin{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}
.domain-name{font-size:.72rem;font-weight:700;color:var(--text);}
.domain-desc{font-size:.6rem;color:var(--text3);line-height:1.4;}
.domain-badge{
  display:inline-block;font-size:.5rem;font-weight:800;
  letter-spacing:.12em;text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;
  padding:1px 5px;border-radius:2px;margin-top:2px;
  background:rgba(236,185,19,.1);color:var(--gold);
  border:1px solid rgba(236,185,19,.2);
}
.domain-badge.b{background:rgba(96,165,250,.1);color:var(--bcast);border-color:rgba(96,165,250,.2);}
.domain-badge.g{background:rgba(167,139,250,.1);color:var(--gov);border-color:rgba(167,139,250,.2);}
.domain-badge.r{background:rgba(52,211,153,.1);color:var(--reg);border-color:rgba(52,211,153,.2);}

/* footer bar */
.ftr{
  position:relative;z-index:2;
  height:38px;background:var(--footer);
  border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;
}
.ftr-item{
  display:flex;align-items:center;gap:5px;
  font-family:'JetBrains Mono',monospace;font-size:.56rem;
  color:var(--text3);letter-spacing:.04em;
}
.ftr-dot{width:5px;height:5px;border-radius:50%;}
.ftr-dot.ok{background:var(--ok);}
.ftr-dot.warn{background:var(--eco);}
.ftr-sep{width:1px;height:14px;background:var(--border);}
.ftr-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.proto{
  font-family:'JetBrains Mono',monospace;font-size:.52rem;
  background:var(--deep);border:1px solid var(--border);
  color:var(--text3);padding:2px 7px;border-radius:3px;
  letter-spacing:.06em;
}
</style>

<div class="shell">
  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-logo">RTIN · Aureum01</div>
    <div class="hdr-sep"></div>
    <div class="hdr-tag">Intel Dev</div>
    <div class="hdr-tag">OSINT</div>
    <div class="hdr-tag">Automation</div>
    <div class="hdr-live">SIGNAL ACTIVE</div>
    <div class="hdr-ts">UTC+0 · 2026</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT: signal sources -->
    <div class="left">
      <div class="col-lbl">Source Feeds</div>

      <div class="sig-card eco active">
        <div class="sig-row">
          <div class="dot"></div>
          <div class="sig-name">Geopolitical</div>
          <div class="sig-stat">↑ HIGH</div>
        </div>
        <div class="sig-sub">Global risk · Crisis</div>
      </div>

      <div class="sig-card bcast">
        <div class="sig-row">
          <div class="dot"></div>
          <div class="sig-name">OSINT Pipe</div>
          <div class="sig-stat">LIVE</div>
        </div>
        <div class="sig-sub">Open-source · SIGINT</div>
      </div>

      <div class="sig-card gov">
        <div class="sig-row">
          <div class="dot"></div>
          <div class="sig-name">Behavioral</div>
          <div class="sig-stat">SCAN</div>
        </div>
        <div class="sig-sub">Pattern · Psych</div>
      </div>

      <div class="sig-card reg">
        <div class="sig-row">
          <div class="dot"></div>
          <div class="sig-name">AI Systems</div>
          <div class="sig-stat">LOCAL</div>
        </div>
        <div class="sig-sub">Inference · LLM</div>
      </div>

      <div class="sig-card eco">
        <div class="sig-row">
          <div class="dot"></div>
          <div class="sig-name">Automation</div>
          <div class="sig-stat">RUN</div>
        </div>
        <div class="sig-sub">Pipeline · VBA</div>
      </div>

      <div class="sig-card bcast">
        <div class="sig-row">
          <div class="dot"></div>
          <div class="sig-name">Reverse Intel</div>
          <div class="sig-stat">WATCH</div>
        </div>
        <div class="sig-sub">Counter · Analysis</div>
      </div>
    </div>

    <!-- CENTER: main stage -->
    <div class="center">
      <div class="stage-well">
        <div class="stage-title">Roshane Rodney<br/><span>Intelligence Systems Developer</span></div>
        <div class="stage-sub">
          Building <em>automation systems, intelligence workflows, and analytical tools</em>
          that help analysts work more effectively in complex global environments.
          Previously a <em>Corporate Protective Intelligence Analyst</em> — geopolitical
          risk monitoring, GSOC operations, and structured crisis assessment.
        </div>

        <div class="metrics">
          <div class="metric">
            <div class="metric-lbl">Threat Ratio</div>
            <div class="metric-val">0.82</div>
            <div class="metric-bar"><div class="metric-bar-fill"></div></div>
          </div>
          <div class="metric">
            <div class="metric-lbl">Signal Depth</div>
            <div class="metric-val">DEEP</div>
            <div class="metric-bar"><div class="metric-bar-fill"></div></div>
          </div>
          <div class="metric">
            <div class="metric-lbl">Coverage</div>
            <div class="metric-val">GLOBAL</div>
            <div class="metric-bar"><div class="metric-bar-fill"></div></div>
          </div>
        </div>

        <div class="stage-quote">
          The best intelligence does not reduce uncertainty — it maps it with precision,
          so the analyst knows exactly where to act and where to wait.
          <div class="attr">— Operational Doctrine</div>
        </div>
      </div>
    </div>

    <!-- RIGHT: domain panel -->
    <div class="right">
      <div class="domain-lbl">Domain Stack</div>

      <div class="domain-row">
        <div class="domain-name">Geopolitical Intel</div>
        <div class="domain-desc">Global political risk · Crisis monitoring</div>
        <div class="domain-badge">ECO</div>
      </div>
      <div class="domain-row">
        <div class="domain-name">OSINT Engineering</div>
        <div class="domain-desc">Data pipelines · Open-source collection</div>
        <div class="domain-badge b">SIGNAL</div>
      </div>
      <div class="domain-row">
        <div class="domain-name">Behavioral Analysis</div>
        <div class="domain-desc">Pattern analysis · Psychological profiling</div>
        <div class="domain-badge g">PSYCH</div>
      </div>
      <div class="domain-row">
        <div class="domain-name">AI Systems</div>
        <div class="domain-desc">Local inference · Research automation</div>
        <div class="domain-badge r">LOCAL AI</div>
      </div>
      <div class="domain-row">
        <div class="domain-name">Automation</div>
        <div class="domain-desc">Pipeline engineering · VBA · Collection</div>
        <div class="domain-badge">PIPE</div>
      </div>
      <div class="domain-row">
        <div class="domain-name">Reverse Intel</div>
        <div class="domain-desc">Counter-analysis · Narrative tracking</div>
        <div class="domain-badge g">COUNTER</div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="ftr">
    <div class="ftr-item"><div class="ftr-dot ok"></div>Aureum01 · GitHub</div>
    <div class="ftr-sep"></div>
    <div class="ftr-item"><div class="ftr-dot ok"></div>roshanerodney.com</div>
    <div class="ftr-sep"></div>
    <div class="ftr-item"><div class="ftr-dot warn"></div>Hjørring · DK</div>
    <div class="ftr-right">
      <div class="proto">Danskuddannelse 3</div>
      <div class="proto">EUX Elektriker · 2027</div>
      <div class="proto">MARTEC → Maskinmester</div>
    </div>
  </div>
</div>

</div>
</foreignObject>
</svg>
