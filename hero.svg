<span class="tw"> ,'</span><span class="dl">·</span><span class="tw">.   \/</span><span class="b1">  \</span>
<span class="tw">/    '·,</span><span class="b1"> \  '</span><span class="tw">·,    ,'</span><span class="dl">·</span><span class="tw">.</span>
<span class="b1">         \   \</span><span class="tw"> '·, /</span><span class="b1">    '</span><span class="tw">·.</span>
<span class="b1">          \   \   X       '·,</span>
<span class="b1">           \   \ / \</span>
<span class="b1">            \   </span><span class="to">|</span><span class="b1">   \</span><span class="tw">    ,'</span><span class="dl">·</span><span class="tw">.</span>
<span class="b1">             \  </span><span class="to">|</span><span class="b1">    \</span><span class="tw"> /    '</span><span class="b1">·.</span>
<span class="tw">  ,'</span><span class="dl">·</span><span class="tw">.       </span><span class="to">|</span><span class="tw">      X        '</span><span class="b2">·,</span>
<span class="tw"> /    '·,    </span><span class="to">|</span><span class="b1">     / \</span>
<span class="b1">'</span><span class="tw">·,</span><span class="b2">      '·,  </span><span class="to">|</span><span class="b1">    /   \</span>
<span class="b2">    '·,</span><span class="tw">    '·,</span><span class="to">|</span><span class="tw">  ,'</span><span class="b1">     \</span>
<span class="b2">        '·,</span><span class="tw">   </span><span class="to">║</span>
