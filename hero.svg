<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" role="img" aria-label="Roshane Rodney intelligence systems developer banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0a09"/>
      <stop offset="45%" stop-color="#181510"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>

    <radialGradient id="glow" cx="70%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#ecb913" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .sans {
        font-family: Arial, Helvetica, sans-serif;
      }

      .scan {
        animation: scanMove 7s linear infinite;
      }

      @keyframes scanMove {
        0% { transform: translateY(-60px); }
        100% { transform: translateY(480px); }
      }

      .pulse {
        animation: pulse 2.8s ease-in-out infinite;
        transform-origin: center;
      }

      .pulse2 {
        animation: pulse 3.6s ease-in-out infinite;
        transform-origin: center;
        animation-delay: .5s;
      }

      @keyframes pulse {
        0%, 100% { opacity: .25; transform: scale(.96); }
        50% { opacity: .9; transform: scale(1.04); }
      }

      .blink {
        animation: blink 1.1s steps(2, start) infinite;
      }

      @keyframes blink {
        0%, 45% { opacity: 1; }
        46%, 100% { opacity: 0; }
      }

      .bar1 {
        animation: barMove1 4s ease-in-out infinite;
      }

      .bar2 {
        animation: barMove2 4.5s ease-in-out infinite;
      }

      .bar3 {
        animation: barMove3 5s ease-in-out infinite;
      }

      @keyframes barMove1 {
        0%,100% { width: 40px; }
        50% { width: 118px; }
      }

      @keyframes barMove2 {
        0%,100% { width: 55px; }
        50% { width: 132px; }
      }

      @keyframes barMove3 {
        0%,100% { width: 35px; }
        50% { width: 105px; }
      }

      .fadeIn {
        animation: fadeIn 1.2s ease both;
      }

      .delay1 { animation-delay: .15s; }
      .delay2 { animation-delay: .3s; }
      .delay3 { animation-delay: .45s; }
      .delay4 { animation-delay: .6s; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateX(10px); }
        to { opacity: 1; transform: translateX(0); }
      }
    </style>
  </defs>

  <!-- Base -->
  <rect x="0.5" y="0.5" width="859" height="419" rx="8" fill="url(#bg)" stroke="#3D3519"/>
  <rect x="0" y="0" width="860" height="420" fill="url(#glow)"/>

  <!-- Grid -->
  <g opacity="0.14" stroke="#ecb913" stroke-width="1">
    <path d="M0 44H860M0 88H860M0 132H860M0 176H860M0 220H860M0 264H860M0 308H860M0 352H860M0 396H860"/>
    <path d="M44 0V420M88 0V420M132 0V420M176 0V420M220 0V420M264 0V420M308 0V420M352 0V420M396 0V420M440 0V420M484 0V420M528 0V420M572 0V420M616 0V420M660 0V420M704 0V420M748 0V420M792 0V420M836 0V420"/>
  </g>

  <!-- Scan line -->
  <rect class="scan" x="0" y="-40" width="860" height="70" fill="#f97316" opacity="0.08"/>

  <!-- Header -->
  <rect x="0" y="0" width="860" height="44" fill="#181510"/>
  <line x1="0" y1="44" x2="860" y2="44" stroke="#3D3519"/>

  <circle class="blink" cx="20" cy="22" r="4" fill="#ECB913" filter="url(#softGlow)"/>
  <text x="34" y="26" class="mono" font-size="11" font-weight="700" fill="#ECB913" letter-spacing="2">RTIN · AUREUM01</text>

  <line x1="160" y1="13" x2="160" y2="31" stroke="#3D3519"/>

  <rect x="176" y="13" width="66" height="18" rx="3" fill="none" stroke="#3D3519"/>
  <text x="188" y="26" class="mono" font-size="9" font-weight="700" fill="#6B5F3A" letter-spacing="1">INTEL DEV</text>

  <rect x="252" y="13" width="52" height="18" rx="3" fill="none" stroke="#3D3519"/>
  <text x="266" y="26" class="mono" font-size="9" font-weight="700" fill="#6B5F3A" letter-spacing="1">OSINT</text>

  <rect x="314" y="13" width="86" height="18" rx="3" fill="none" stroke="#3D3519"/>
  <text x="326" y="26" class="mono" font-size="9" font-weight="700" fill="#6B5F3A" letter-spacing="1">AUTOMATION</text>

  <rect x="682" y="12" width="112" height="20" rx="3" fill="#2a1010" stroke="#7f1d1d"/>
  <circle class="blink" cx="696" cy="22" r="3" fill="#EF4444"/>
  <text x="706" y="26" class="mono" font-size="9" font-weight="700" fill="#EF4444" letter-spacing="1">SIGNAL ACTIVE</text>

  <text x="810" y="26" class="mono" font-size="9" fill="#6B5F3A" text-anchor="middle">2026</text>

  <!-- Columns -->
  <rect x="0" y="44" width="200" height="338" fill="#181510" opacity="0.72"/>
  <line x1="200" y1="44" x2="200" y2="382" stroke="#3D3519"/>

  <rect x="640" y="44" width="220" height="338" fill="#181510" opacity="0.72"/>
  <line x1="640" y1="44" x2="640" y2="382" stroke="#3D3519"/>

  <!-- Left source feeds -->
  <text x="14" y="68" class="mono" font-size="9" font-weight="800" fill="#ECB913" opacity=".65" letter-spacing="2">SOURCE FEEDS</text>
  <line x1="0" y1="78" x2="200" y2="78" stroke="#3D3519"/>

  <rect x="0" y="84" width="200" height="42" fill="#ECB913" opacity=".06"/>
  <rect x="0" y="84" width="3" height="42" fill="#ECB913"/>
  <circle cx="16" cy="102" r="3" fill="#ECB913"/>
  <text x="27" y="105" class="sans" font-size="12" font-weight="700" fill="#E8E0CC">Geopolitical</text>
  <text x="156" y="105" class="mono" font-size="9" font-weight="700" fill="#ECB913">HIGH</text>
  <text x="27" y="119" class="mono" font-size="9" fill="#6B5F3A">Global risk · Crisis</text>

  <circle cx="16" cy="145" r="3" fill="#60A5FA"/>
  <text x="27" y="148" class="sans" font-size="12" font-weight="700" fill="#E8E0CC">OSINT Pipe</text>
  <text x="160" y="148" class="mono" font-size="9" font-weight="700" fill="#60A5FA">LIVE</text>
  <text x="27" y="162" class="mono" font-size="9" fill="#6B5F3A">Open-source · Signal</text>

  <circle cx="16" cy="188" r="3" fill="#A78BFA"/>
  <text x="27" y="191" class="sans" font-size="12" font-weight="700" fill="#E8E0CC">Behavioral</text>
  <text x="158" y="191" class="mono" font-size="9" font-weight="700" fill="#A78BFA">SCAN</text>
  <text x="27" y="205" class="mono" font-size="9" fill="#6B5F3A">Pattern · Psych</text>

  <circle cx="16" cy="231" r="3" fill="#34D399"/>
  <text x="27" y="234" class="sans" font-size="12" font-weight="700" fill="#E8E0CC">AI Systems</text>
  <text x="150" y="234" class="mono" font-size="9" font-weight="700" fill="#34D399">LOCAL</text>
  <text x="27" y="248" class="mono" font-size="9" fill="#6B5F3A">Inference · LLM</text>

  <circle cx="16" cy="274" r="3" fill="#ECB913"/>
  <text x="27" y="277" class="sans" font-size="12" font-weight="700" fill="#E8E0CC">Automation</text>
  <text x="166" y="277" class="mono" font-size="9" font-weight="700" fill="#ECB913">RUN</text>
  <text x="27" y="291" class="mono" font-size="9" fill="#6B5F3A">Pipeline · VBA</text>

  <circle cx="16" cy="317" r="3" fill="#60A5FA"/>
  <text x="27" y="320" class="sans" font-size="12" font-weight="700" fill="#E8E0CC">Reverse Intel</text>
  <text x="154" y="320" class="mono" font-size="9" font-weight="700" fill="#60A5FA">WATCH</text>
  <text x="27" y="334" class="mono" font-size="9" fill="#6B5F3A">Counter · Analysis</text>

  <!-- Center stage -->
  <rect x="216" y="58" width="408" height="306" rx="14" fill="#0f0e0a" stroke="#3D3519"/>
  <line x1="236" y1="58" x2="604" y2="58" stroke="#ECB913" opacity=".25"/>

  <text x="238" y="99" class="sans" font-size="25" font-weight="800" fill="#E8E0CC">Roshane Rodney</text>
  <text x="238" y="128" class="sans" font-size="22" font-weight="800" fill="#ECB913">Intelligence Systems Developer</text>

  <text x="238" y="163" class="sans" font-size="13" fill="#A89D72">
    <tspan x="238" dy="0">Building automation systems, intelligence workflows,</tspan>
    <tspan x="238" dy="20">and analytical tools for complex global environments.</tspan>
    <tspan x="238" dy="20">Previously a Corporate Protective Intelligence Analyst</tspan>
    <tspan x="238" dy="20">focused on geopolitical risk, GSOC operations, and crisis</tspan>
    <tspan x="238" dy="20">assessment.</tspan>
  </text>

  <!-- Metrics -->
  <rect x="238" y="250" width="112" height="62" rx="9" fill="#181510" stroke="#3D3519"/>
  <text x="250" y="270" class="mono" font-size="8" font-weight="800" fill="#6B5F3A" letter-spacing="1">THREAT RATIO</text>
  <text x="250" y="292" class="mono" font-size="15" font-weight="700" fill="#ECB913">0.82</text>
  <rect x="250" y="301" width="80" height="3" rx="1" fill="#3D3519"/>
  <rect class="bar1" x="250" y="301" height="3" rx="1" fill="#ECB913"/>

  <rect x="358" y="250" width="112" height="62" rx="9" fill="#181510" stroke="#3D3519"/>
  <text x="370" y="270" class="mono" font-size="8" font-weight="800" fill="#6B5F3A" letter-spacing="1">SIGNAL DEPTH</text>
  <text x="370" y="292" class="mono" font-size="15" font-weight="700" fill="#60A5FA">DEEP</text>
  <rect x="370" y="301" width="80" height="3" rx="1" fill="#3D3519"/>
  <rect class="bar2" x="370" y="301" height="3" rx="1" fill="#60A5FA"/>

  <rect x="478" y="250" width="112" height="62" rx="9" fill="#181510" stroke="#3D3519"/>
  <text x="490" y="270" class="mono" font-size="8" font-weight="800" fill="#6B5F3A" letter-spacing="1">COVERAGE</text>
  <text x="490" y="292" class="mono" font-size="15" font-weight="700" fill="#34D399">GLOBAL</text>
  <rect x="490" y="301" width="80" height="3" rx="1" fill="#3D3519"/>
  <rect class="bar3" x="490" y="301" height="3" rx="1" fill="#34D399"/>

  <!-- Quote -->
  <rect x="238" y="325" width="352" height="24" rx="7" fill="#2a2412" opacity=".7" stroke="#3D3519"/>
  <text x="252" y="341" class="mono" font-size="10" fill="#A89D72">Find the signal. Structure the evidence. Reduce the noise.</text>

  <!-- Right domain stack -->
  <text x="654" y="68" class="mono" font-size="9" font-weight="800" fill="#ECB913" opacity=".65" letter-spacing="2">DOMAIN STACK</text>
  <line x1="640" y1="78" x2="860" y2="78" stroke="#3D3519"/>

  <g class="fadeIn delay1">
    <text x="654" y="105" class="sans" font-size="12" font-weight="700" fill="#E8E0CC">Geopolitical Intel</text>
    <text x="654" y="121" class="sans" font-size="10" fill="#6B5F3A">Global political risk · Crisis monitoring</text>
    <rect x="654" y="130" width="38" height="15" rx="2" fill="#2a2412" stroke="#5a4712"/>
    <text x="663" y="141" class="mono" font-size="8" font-weight="700" fill="#ECB913">ECO</text>
  </g>

  <g class="fadeIn delay2">
    <text x="654" y="171" class="sans" font-size="12" font-weight="700" fill="#E8E0CC">OSINT Engineering</text>
    <text x="654" y="187" class="sans" font-size="10" fill="#6B5F3A">Data pipelines · Open-source collection</text>
    <rect x="654" y="196" width="58" height="15" rx="2" fill="#0b1c2e" stroke="#1e3a5f"/>
    <text x="663" y="207" class="mono" font-size="8" font-weight="700" fill="#60A5FA">SIGNAL</text>
  </g>

  <g class="fadeIn delay3">
    <text x="654" y="237" class="sans" font-size="12" font-weight="700" fill="#E8E0CC">Behavioral Analysis</text>
    <text x="654" y="253" class="sans" font-size="10" fill="#6B5F3A">Pattern analysis · Psychological profiling</text>
    <rect x="654" y="262" width="50" height="15" rx="2" fill="#1c1233" stroke="#3b246b"/>
    <text x="663" y="273" class="mono" font-size="8" font-weight="700" fill="#A78BFA">PSYCH</text>
  </g>

  <g class="fadeIn delay4">
    <text x="654" y="303" class="sans" font-size="12" font-weight="700" fill="#E8E0CC">AI Systems</text>
    <text x="654" y="319" class="sans" font-size="10" fill="#6B5F3A">Local inference · Research automation</text>
    <rect x="654" y="328" width="62" height="15" rx="2" fill="#0b2a1d" stroke="#145c3d"/>
    <text x="663" y="339" class="mono" font-size="8" font-weight="700" fill="#34D399">LOCAL AI</text>
  </g>

  <!-- Decorative signal circles -->
  <circle class="pulse" cx="560" cy="125" r="42" fill="none" stroke="#f97316" stroke-opacity=".55"/>
  <circle class="pulse2" cx="560" cy="125" r="62" fill="none" stroke="#ecb913" stroke-opacity=".28"/>

  <!-- Footer -->
  <rect x="0" y="382" width="860" height="38" fill="#221E10"/>
  <line x1="0" y1="382" x2="860" y2="382" stroke="#3D3519"/>

  <circle cx="18" cy="401" r="3" fill="#4ADE80"/>
  <text x="28" y="404" class="mono" font-size="9" fill="#6B5F3A">Aureum01 · GitHub</text>

