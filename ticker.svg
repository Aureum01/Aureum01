<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 64" width="860" height="64" role="img" aria-label="Animated intelligence ticker">
  <defs>
    <clipPath id="clip">
      <rect x="0" y="0" width="860" height="64" rx="6"/>
    </clipPath>

    <style>
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .label {
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 2px;
        fill: #6B5F3A;
      }

      .value {
        font-size: 13px;
        font-weight: 700;
        fill: #ECB913;
      }

      .blue { fill: #60A5FA; }
      .purple { fill: #A78BFA; }
      .green { fill: #34D399; }
      .red { fill: #EF4444; }

      .live {
        animation: pulse 1.2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .25; }
      }

      .scan {
        animation: scan 7s linear infinite;
      }

      @keyframes scan {
        0% { transform: translateY(-70px); }
        100% { transform: translateY(130px); }
      }
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="859" height="63" rx="6" fill="#0f0e0a" stroke="#3D3519"/>

  <g opacity="0.18" stroke="#ECB913" stroke-width="1">
    <path d="M0 22H860M0 44H860"/>
    <path d="M44 0V64M88 0V64M132 0V64M176 0V64M220 0V64M264 0V64M308 0V64M352 0V64M396 0V64M440 0V64M484 0V64M528 0V64M572 0V64M616 0V64M660 0V64M704 0V64M748 0V64M792 0V64M836 0V64"/>
  </g>

  <rect class="scan" x="0" y="-64" width="860" height="64" fill="#ECB913" opacity="0.035"/>

  <g clip-path="url(#clip)">
    <g>
      <animateTransform
        attributeName="transform"
        type="translate"
        from="0 0"
        to="-1500 0"
        dur="28s"
        repeatCount="indefinite"/>

      <!-- Set 1 -->
      <g transform="translate(0 0)">
        <g transform="translate(18 0)">
          <circle class="live" cx="0" cy="32" r="4" fill="#EF4444"/>
          <text x="14" y="27" class="mono label">STATUS</text>
          <text x="14" y="44" class="mono value red">ANALYST ACTIVE</text>
        </g>

        <g transform="translate(185 0)">
          <circle cx="0" cy="32" r="4" fill="#ECB913"/>
          <text x="14" y="27" class="mono label">SPECIALTY</text>
          <text x="14" y="44" class="mono value">PROTECTIVE INTEL</text>
        </g>

        <g transform="translate(380 0)">
          <circle cx="0" cy="32" r="4" fill="#60A5FA"/>
          <text x="14" y="27" class="mono label">STACK</text>
          <text x="14" y="44" class="mono value blue">OSINT · AI · AUTOMATION</text>
        </g>

        <g transform="translate(615 0)">
          <circle cx="0" cy="32" r="4" fill="#A78BFA"/>
          <text x="14" y="27" class="mono label">REGION FOCUS</text>
          <text x="14" y="44" class="mono value purple">GLOBAL · MENA · EU</text>
        </g>

        <g transform="translate(830 0)">
          <circle cx="0" cy="32" r="4" fill="#34D399"/>
          <text x="14" y="27" class="mono label">LOCATION</text>
          <text x="14" y="44" class="mono value green">DK</text>
        </g>

        <g transform="translate(1020 0)">
          <circle cx="0" cy="32" r="4" fill="#ECB913"/>
          <text x="14" y="27" class="mono label">PROJECTS</text>
          <text x="14" y="44" class="mono value">TRAVELRISK · RTIN · MISR</text>
        </g>

        <g transform="translate(1250 0)">
          <circle cx="0" cy="32" r="4" fill="#60A5FA"/>
          <text x="14" y="27" class="mono label">EDUCATION</text>
          <text x="14" y="44" class="mono value blue">CRIMINOLOGY + CIS · FLAGLER</text>
        </g>
      </g>

      <!-- Set 2 duplicate for loop -->
      <g transform="translate(1500 0)">
        <g transform="translate(18 0)">
          <circle class="live" cx="0" cy="32" r="4" fill="#EF4444"/>
          <text x="14" y="27" class="mono label">STATUS</text>
          <text x="14" y="44" class="mono value red">ANALYST ACTIVE</text>
        </g>

        <g transform="translate(185 0)">
          <circle cx="0" cy="32" r="4" fill="#ECB913"/>
          <text x="14" y="27" class="mono label">SPECIALTY</text>
          <text x="14" y="44" class="mono value">PROTECTIVE INTEL</text>
        </g>

        <g transform="translate(380 0)">
          <circle cx="0" cy="32" r="4" fill="#60A5FA"/>
          <text x="14" y="27" class="mono label">STACK</text>
          <text x="14" y="44" class="mono value blue">OSINT · AI · AUTOMATION</text>
        </g>

        <g transform="translate(615 0)">
          <circle cx="0" cy="32" r="4" fill="#A78BFA"/>
          <text x="14" y="27" class="mono label">REGION FOCUS</text>
          <text x="14" y="44" class="mono value purple">GLOBAL · MENA · EU</text>
        </g>

        <g transform="translate(830 0)">
          <circle cx="0" cy="32" r="4" fill="#34D399"/>
          <text x="14" y="27" class="mono label">LOCATION</text>
          <text x="14" y="44" class="mono value green">HJØRRING · DK</text>
        </g>

        <g transform="translate(1020 0)">
          <circle cx="0" cy="32" r="4" fill="#ECB913"/>
          <text x="14" y="27" class="mono label">PROJECTS</text>
          <text x="14" y="44" class="mono value">RTIN · Crxreader </text>
        </g>

        <g transform="translate(1250 0)">
          <circle cx="0" cy="32" r="4" fill="#60A5FA"/>
          <text x="14" y="27" class="mono label">EDUCATION</text>
          <text x="14" y="44" class="mono value blue">CRIMINOLOGY + CIS </text>
        </g>
      </g>
    </g>
  </g>
</svg>
